general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Normal locking behavior (visual cmatrix is now handled by idle-cmatrix-daemon.sh)
# You can add your lock timeout here if desired, e.g.:
# listener {
#     timeout = 1200   # 20 minutes
#     on-timeout = hyprlock
# }

