# ----------------------------------------------------- 
# General window layout and colors
# name: "No Border"
# ----------------------------------------------------- 

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 0
    col.active_border = $primary  # Matugen primary accent (was $color11 from pywal)
    col.inactive_border = rgba(ffffffff)
    layout = dwindle
    resize_on_border = true
}
