# ----------------------------------------------------- 
# General window layout and colors
# name: "Default"
# ----------------------------------------------------- 

general {
    gaps_in = 10
    gaps_out = 14
    border_size = 4
    col.active_border = $on_primary  # (previously referenced old $color11)
    col.inactive_border = $on_secondary  #rgba(ffffffff)
    layout = dwindle
    resize_on_border = true
}
