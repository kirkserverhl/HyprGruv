# -----------------------------------------------------
# Window rules (modern syntax)
# -----------------------------------------------------

# Define a named "floating utility" rule once
windowrule {
    name = float-utils
    float = true
    center = true
    size = 900 700
    # You can add more here: pin = true, noinitialfocus = true, etc.
}

# Then apply that rule to as many programs as you want
windowrule {
    name = float-utils
    match:class = waypaper
}

windowrule {
    name = float-utils
    match:class = pavucontrol
}

windowrule {
    name = float-utils
    match:class = blueman-manager
}

windowrule {
    name = float-utils
    match:class = nm-connection-editor


# Simple floating windows
windowrule = float on, match:class = ^pavucontrol$
windowrule = float on, match:class = ^blueman-manager$
windowrule = float on, match:class = ^nm-connection-editor$
windowrule = float on, match:class = ^kcalc$

# Waypaper & Pomodoro
windowrule = float on, match:class = ^waypaper$
windowrule = float on, match:class = pomodorolm

# Dotfiles floating windows
windowrule = float on, match:class = ^dotfiles-floating$
windowrule = center on, match:class = ^dotfiles-floating$
windowrule = size 1000 700, match:class = ^dotfiles-floating$
windowrule = pin on, match:class = ^dotfiles-floating$

# Browser Picture-in-Picture
windowrule = float on, match:title = ^Picture-in-Picture$
windowrule = pin on, match:title = ^Picture-in-Picture$
windowrule = move 69.5% 4%, match:title = ^Picture-in-Picture$

# Opacity rules
windowrule = opacity 0.9 0.9, match:class = ^nemo$
windowrule = opacity 0.9 0.9, match:class = ^kitty$
windowrule = opacity 0.9 0.9, match:class = ^smile$
windowrule = opacity 0.9 0.9, match:class = ^rofi$
windowrule = opacity 0.9 0.9, match:class = ^alacritty$
windowrule = opacity 0.9 0.9, match:class = ^waypaper$
windowrule = opacity 0.9 0.9, match:class = ^ghostty$

# VLC
windowrule = float on, match:class = ^vlc$

# Emoji Picker (Smile)
windowrule = float on, match:class = ^it\.mijorus\.smile$
windowrule = pin on, match:class = ^it\.mijorus\.smile$
windowrule = move 100%-w-40 90, match:class = ^it\.mijorus\.smile$

# Hyprland Share Picker
windowrule = float on, match:class = ^hyprland-share-picker$
windowrule = pin on, match:class = ^hyprland-share-picker$
windowrule = center on, match:class = ^hyprland-share-picker$
windowrule = size 600 400, match:class = ^hyprland-share-picker$

# Initial Config Check
windowrule = float on, match:title = ^Initial Config Check$
windowrule = center on, match:title = ^Initial Config Check$

# Floating small utilities (waypaper, pavucontrol, etc.)
windowrule = match:class ^(waypaper|pavucontrol|blueman-manager)$, float on
windowrule = match:class ^(waypaper|pavucontrol|blueman-manager)$, center on
windowrule = match:class ^(waypaper|pavucontrol|blueman-manager)$, size 900 700
}
