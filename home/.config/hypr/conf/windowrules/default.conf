# =============================================================
# LAYER RULES
# =============================================================

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  no_anim = on
  match:namespace = waybar
}

#layerrule {
#  name = layerrule-2
#  blur = on
#  ignore_alpha = 0.5
#  match:namespace = swaync-control-center
#}

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0.5
  match:namespace = swaync-notification-window
}

layerrule {
  name = layerrule-1
  blur = on
  animation = fade
  match:namespace = logout_dialog
}

layerrule {
  name = layerrule-2
  blur = on
  animation = popin 95%
  match:namespace = rofi
}

layerrule {
  name = layerrule-3
  animation = fade
  match:namespace = hyprpicker
}

# === FLOATING WINDOW RULES ===

# Terminal utilities (match by kitty + window title)
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(kitty)$
  match:title = ^(htop)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(kitty)$
  match:title = ^(bpytop)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^(kitty)$
  match:title = ^(yazi)$
}


# You can also force a nice size + center for these small tools
windowrule {
  name = windowrule-4
  size = 1200 800
  center = on
  match:class = ^(kitty)$
  match:title = ^(htop|bpytop|yazi)$
}


# Smile (emoji picker) - usually has class "smile"
windowrule {
  name = windowrule-5
  float = on
  center = on
  match:class = ^(smile)$
}


# Rofi calculator (depends on how your script launches it)
windowrule {
  name = windowrule-6
  float = on
  center = on
  match:class = ^(Rofi)$
}

windowrule {
  name = windowrule-7
  size = 600 400
  match:class = ^(Rofi)$   # adjust size as needed
}

windowrule = match:class ^(waypaper)$, float on
#:windowrulev2 = float,class:^(kitty)$,title:^(btop|htop)$
nwindowrule = float, class:^(yazi)$
