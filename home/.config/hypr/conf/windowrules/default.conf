# -----------------------------------------------------
# Window rules (modern syntax)
# -----------------------------------------------------
# Define a named "floating utility" rule once
windowrule {
    name = float-utils
    float = true
    center = true
    size = 900 700
    # You can add more here: pin = true, noinitialfocus = true, etc.
}

# Then apply that rule to as many programs as you want
#windowrule {
#    name = float-utils
#    match:class = waypaper
#}

windowrule {
    name = float-utils
    match:class = pavucontrol
}

windowrule {
    name = float-utils
    match:class = blueman-manager
}

windowrule {
    name = float-utils
    match:class = nm-connection-editor
}
windowrule {
  name = windowrule-1
  float = on
  opacity = 0.9 0.9
  match:class = ^(waypaper)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = pomodorolm
}

# Floating Windows
windowrule {
  name = windowrule-3
  float = on
  center = on
  size = 1000 700
  match:class = ^(dotfiles-floating)$
}

# Browser Picture in Picture
windowrule {
  name = windowrule-4
  float = on
  pin = on
  move = ((monitor_w*0.695)) ((monitor_h*0.04))
  match:title = ^(Picture-in-Picture)$
}

# Testing 
windowrule {
  name = windowrule-5
  opacity = 0.9 0.9
  match:class = ^(nemo)$
}

windowrule {
  name = windowrule-6
  opacity = 0.9 0.9
  match:class = ^(kitty)$
}

windowrule {
  name = windowrule-7
  opacity = 0.9 0.9
  match:class = ^(smile)$
}

windowrule {
  name = windowrule-8
  opacity = 0.9 0.9
  match:class = ^(rofi)$
}

windowrule {
  name = windowrule-9
  opacity = 0.9 0.9
  match:class = ^(alacritty)$
}

windowrule {
  name = windowrule-10
  opacity = 0.9 0.9
  match:class = ^(ghostty)$
}

windowrule {
  name = windowrule-11
  float = on
  match:class = ^(vlc)$
}

# Emoji Picker Smile
windowrule {
  name = windowrule-12
  float = on
  pin = on
  move = ((monitor_w*1)-window_w-40) (90)
  match:class = (it.mijorus.smile)
}

# Hyprland Share Picker
windowrule {
  name = windowrule-13
  float = on
  pin = on
  size = 600 400
  match:class = (hyprland-share-picker)
}

windowrule {
  name = windowrule-14
  center = on
  match:title = class:(hyprland-share-picker)
}

# General floating
windowrule {
  name = windowrule-15
  float = on
  size = 1000 700
  center = on
  pin = on
  match:class = (dotfiles-floating)
}
# windowrule = float,^(pavucontrol)$
# windowrule = float,^(blueman-manager)$
# windowrule = float,^(nm-connection-editor)$
# windowrule = float,^(kcalc)$

# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GDK
env = GDK_SCALE,1


