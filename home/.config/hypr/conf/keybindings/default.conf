# ----------------------------------------------------- 
# Key bindings
# name: "Default"
# ----------------------------------------------------- 
# =============================================
# Hyprland Keybinds - CLEANED & ORGANIZED
# =============================================

# === Modifiers ===
$mainMod = SUPER
$mod = ALT
$SCRIPTS = ~/.config/hypr/scripts

# Mac-like Copy & Paste + Cut + Undo
binde = $mainMod, C, sendshortcut, CTRL, INSERT,      # Copy
binde = $mainMod, V, sendshortcut, SHIFT, INSERT,     # Paste (plain)
binde = $mainMod SHIFT, V, sendshortcut, CTRL, V,     # Paste with format
binde = $mainMod, X, sendshortcut, CTRL, X,           # Cut
binde = $mainMod, Z, sendshortcut, CTRL, Z,           # Undo (Cmd+Z → Ctrl+Z)
binde = $mainMod, I, sendshortcut, CTRL, I,           # Italic
binde = $mainMod, U, sendshortcut, CTRL, U,           # Underline
binde = $mainMod, K, sendshortcut, CTRL, K,           # Insert hyperlink / link
bind = $mainMod SHIFT, 4, exec, $SCRIPTS/hyprshot.sh                    # Take a screenshot

# === TERMINALS & LAUNCHERS ===
bind = $mainMod, RETURN, exec, kitty
bind = $mod, RETURN, exec,  alacritty             # optional second terminal

# Browsers
bind = CTRL, B, exec, brave-browser          # Brave as main
bind = $mainMod, B, exec, google-chrome-stable         # Chrome as secondary
bind = $mod, B, exec, firefox

# File Managers
bind = $mainMod, Y, exec, kitty yazi
bind = $mainMod, F, exec, dolphin

# Editors & Monitoring
bind = $mainMod, N, exec, kitty nvim
bind = $mod, H, exec, kitty htop
bind = $mod, T, exec, kitty bpytop

# Utilities
bind = $mainMod $mod, P, exec, kitty pacseek
bind = $mod, P, exec, hyprpicker -a
bind = $mainMod, E, exec, smile
bind = $mod, C, exec, $SCRIPTS/rofi_calc.sh

# === ACTIONS ===
bind = $mainMod CTRL, Q, exec, wlogout
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/hyprlock/hyprlock.conf
bind = CTRL ALT, DELETE, exec, wlogout
bind = $mod, F, fullscreen,
bind = $mod, V, togglefloating,
bind = $mod, L, exec, hyprlock

# Screenshots
bind = $mainMod, PRINT, exec, $SCRIPTS/hyprshot.sh

# Clip Hitory
bind = $mainMod CTRL, C, exec, $SCRIPTS/cliphist.sh

# Application Launcher
bind = $mainMod, SPACE, exec, pkill rofi || rofi -show drun -replace -i -terminal kitty

# Theme / Bar / Monitor
bind = $mainMod, W, exec, waypaper
bind = $mainMod CTRL, W, exec, $SCRIPTS/toggle-waybar.sh
bind = $mainMod ALT, W, exec, $SCRIPTS/toggle-personal-work.sh
bind = $mainMod SHIFT, W, exec, $SCRIPTS/window-rofi.sh
bind = $mod, M, exec, $SCRIPTS/monitor-rofi.sh
bind = $mod, R, exec, $SCRIPTS/launch.sh

# Night / Blitz Mode
bind = $mod, N, exec, ~/.local/bin/night-mode.sh
# bind = SUPER F1, exec, $SCRIPTS/blitz-mode.sh   # WIN = SUPER

# === MAC-STYLE SHORTCUTS ===
binde = $mainMod, C, sendshortcut, CTRL, INSERT      # Copy
binde = $mainMod, V, sendshortcut, SHIFT, INSERT     # Paste (plain)
binde = $mainMod SHIFT, V, sendshortcut, CTRL, V     # Paste with formatting
binde = $mainMod, X, sendshortcut, CTRL, X           # Cut
binde = $mainMod, Z, sendshortcut, CTRL, Z           # Undo
binde = $mainMod, I, sendshortcut, CTRL, I           # Italic
binde = $mainMod, U, sendshortcut, CTRL, U           # Underline
binde = $mainMod, K, sendshortcut, CTRL, K           # Insert link

# === WINDOW MANAGEMENT ===
bind = $mainMod, Q, killactive
bind = $mod CTRL, F, fullscreen
bind = $mod, F, togglefloating
bind = $mod, S, togglesplit
bind = $mainMod, P, pseudo                          # Dwindle: pseudotile


# Focus (Arrows + Vim)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move Windows
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Resize
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left,  resizeactive, -100 0
bind = $mainMod SHIFT, down,  resizeactive, 0 100
bind = $mainMod SHIFT, up,    resizeactive, 0 -100
bind = $mainMod SHIFT, L, resizeactive, 100 0
bind = $mainMod SHIFT, H, resizeactive, -100 0
bind = $mainMod SHIFT, J, resizeactive, 0 100
bind = $mainMod SHIFT, K, resizeactive, 0 -100

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# === MEDIA & HARDWARE ===
bindel = , F2, exec, $SCRIPTS/volume.sh --toggle
bindel = , F3, exec, $SCRIPTS/volume.sh --dec
bindel = , F4, exec, $SCRIPTS/volume.sh --inc

bindel = , F5, exec, $SCRIPTS/brightness.sh --dec
bindel = , F6, exec, $SCRIPTS/brightness.sh --inc

bind = , F7,  exec, playerctl previous
bind = , F8, exec, playerctl play-pause
bind = , F9, exec, playerctl next

# Real fullscreen (hides bars, borders, gaps — best for games)
bind = , F11, fullscreen, 0

# Or "maximized" style fullscreen (keeps bars/borders/gaps visible)
# bind = , F11, fullscreen, 1

# === SPECIAL WORKSPACES ===
bind = $mod, S, togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace, special

# === WORKSPACES ===
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
#bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod SHIFT, E, movetoworkspace, empty

bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1

# Move all windows to workspace
bind = $mainMod CTRL, 1, exec, $SCRIPTS/moveTo.sh 1
bind = $mainMod CTRL, 2, exec, $SCRIPTS/moveTo.sh 2
bind = $mainMod CTRL, 3, exec, $SCRIPTS/moveTo.sh 3
bind = $mainMod CTRL, 4, exec, $SCRIPTS/moveTo.sh 4
bind = $mainMod CTRL, 5, exec, $SCRIPTS/moveTo.sh 5
bind = $mainMod CTRL, 6, exec, $SCRIPTS/moveTo.sh 6
bind = $mainMod CTRL, 7, exec, $SCRIPTS/moveTo.sh 7
bind = $mainMod CTRL, 8, exec, $SCRIPTS/moveTo.sh 8
bind = $mainMod CTRL, 9, exec, $SCRIPTS/moveTo.sh 9

# Mouse wheel workspace switching
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# === ZOOM / ACCESSIBILITY ===
binde = $mod, equal,       exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = $mod, minus,       exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
binde = $mod, KP_ADD,      exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = $mod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

bind = $mod CTRL, mouse_up,   exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mod CTRL, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mod CTRL, minus,      exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mod CTRL, 0,          exec, hyprctl -q keyword cursor:zoom_factor 1

# OBS Recording (pass through)
bind = Control_L Super, R, pass, class:^(com\.obsproject\.Studio)$

# Notification Center
bind = $mod, A, exec, swaync-client -t -sw
bind = $mod Control Shift, A, exec, swaync-client -R && swaync-client -rs

# Swap Escape and Caps
input {
    kb_options = caps:swapescape
}
# Matrix screensaver
bind = $mainMod SHIFT, M, exec, kitty -e cmatrix

# Kill waybar (SUPER + K)
bind = $mainMod, K, exec, pkill -x waybar

# Launch waybar (ALT + K)
bind = $mod, K, exec, waybar

## Wallpaper switcher
 bind = $mainMod SHIFT, T, exec, pkill rofi || ~/.config/colorschemes/wallpaper-selector.sh
#bind = $mainMod CTRL, 0, exec, $SCRIPTS/moveTo.sh 10 # Move all windows to workspace 10

# NOT LISTED ON KEYBIND SCRIPT
bind = $mainMod, mouse_down, workspace, e+1 # Open next workspace
bind = $mainMod, mouse_up, workspace, e-1 # Open previous workspace
bind = $mainMod CTRL, SPACE, workspace, empty # Open the next empty workspace

hyprbars = /var/cache/hyprpm/user@0/hyprland-plugins/hyprbars.so
bind = $mainMod, R, exec, hyprctl plugin load $hyprbars
bind = $mainMod Shift, R, exec, hyprctl plugin unload $hyprbars

# Titlebars
$hyprbars = /var/cache/hyprpm/user0/hyprland-plugins/hyprbars.so

bind = $mainMod, Y, exec, hyprctl plugin load $hyprbars
bind = $mainMod Shift, Y, exec, hyprctl plugin unload $hyprbars

# Overview
#bind = $mod, Tab, hyprexpo:expo, toggle

# Layout
bind = $mainMod, J, exec, hyprctl keyword general:layout scrolling
bind = $mainMod Shift, J, exec, hyprctl keyword general:layout master

# Browser
# bind = $mainMod, B, exec, zen-browser
bind = $mainMod SHIFT, B, exec, brave

# Theme switcher
bind = $mainMod, T, exec, pkill rofi || walset

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace
bind = $mainMod SHIFT, S, movetoworkspace, special

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Master layout
bind = SUPER, Z, layoutmsg, addmaster
bind = SUPER Shift, Z, layoutmsg, removemaster
bind = SUPER, H, layoutmsg, mfact -0.05
bind = SUPER, L, layoutmsg, mfact +0.05

# Scrolling layout
# move the view by columns
bind = SUPER, period, layoutmsg, move +col
bind = SUPER, comma,  layoutmsg, move -col
