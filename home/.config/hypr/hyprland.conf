# -----------------------------------------------------

# -----------------------------------------------------
# Monitor
# -----------------------------------------------------
source = ~/.config/hypr/conf/monitor.conf

# -----------------------------------------------------
# Cursor:
# -----------------------------------------------------
source = ~/.config/hypr/conf/cursor.conf

# -----------------------------------------------------
# Environment
# -----------------------------------------------------
source = ~/.config/hypr/conf/environment.conf

# -----------------------------------------------------
# Keyboard
# -----------------------------------------------------
source = ~/.config/hypr/conf/keyboard.conf

# -----------------------------------------------------
# Load Matugen color file
# -----------------------------------------------------
source = ~/.config/hypr/colors/colors.conf

# -----------------------------------------------------
# Load pywal color file
# -----------------------------------------------------

source = ~/.cache/wal/colors-hyprland.conf
source = ~/.config/hypr/colors/colors.conf

# -----------------------------------------------------
# Autostart
# -----------------------------------------------------
source = ~/.config/hypr/conf/autostart.conf

# -----------------------------------------------------
# Load configuration files
# -----------------------------------------------------
source = ~/.config/hypr/conf/window.conf
source = ~/.config/hypr/conf/decorations.conf
source = ~/.config/hypr/conf/layout.conf
source = ~/.config/hypr/conf/keybinding.conf
source = ~/.config/hypr/conf/windowrule.conf
source = ~/.config/hypr/conf/misc.conf
source = ~/.config/hypr/conf/workspaces.conf
source = ~/.config/hypr/conf/plugins.conf
source = ~/.config/hypr/conf/gestures.conf
source = ~/.config/hypr/conf/animations.conf

# Colors
source = ~/.config/hypr/colors/colors.conf
source = ~/.config/hypr/colors/custom/matugen.conf

env = TERMINAL,~/scripts/terminal.sh
env = BROWSER,~/scripts/browser.sh
env = FILEMANAGER,~/scripts/filemanagers.sh

# -----------------------------------------------------
# Custom
# -----------------------------------------------------
source = ~/.config/hypr/conf/custom.conf

# -----------------------------------------------------
# Settings
# -----------------------------------------------------
# source = ~/.config/hypr/conf/settings.conf
exec-once = systemctl --user start hyprpolkitagent

# source = ~/.cache/wal/colors-hyprland.conf
# chromakey_enable = fullscreen:0

# -----------------------------------------------------
# Restore Wallpaper on Login
# -----------------------------------------------------
exec-once = ~/scripts/waybar_kill.sh
exec-once = ~/scripts/launch.sh
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec = ~/scripts/konsole_wal.sh
exec-once = kded5
exec-once = /usr/lib/org_kde_powerdevil
bindm = SUPER, mouse:273, resizewindow

# HyprEmoji config
source = ~/.config/hypremoji/hypremoji.conf

# export XDG_CURRENT_DESKTOP=Hyprland
# env = GTK_THEME,Gruvbox-Material-Dark

# HyprMod managed settings
# source = /home/kirk/.config/hypr/hyprland-gui.conf

