$CITY         		= Raleigh 
$COUNTRY      		= United States
$font = Agave Nerd Font

# Source Hyprland's matugen output so $primary / $secondary (and $on_* etc) resolve correctly.
# We intentionally source the *hyprland* matugen.conf (not the one in hyprlock/colors/)
# because:
#   - It is the canonical source of the Material You primary/secondary names in this setup
#   - It only contains solid (ff) color definitions — no transparent/alpha "listings"
#     (the hyprlock template adds e.g. $lock_input_bg with 'cc' alpha which we don't use here)
source = $HOME/.config/hypr/colors/custom/matugen.conf
# NOTE: $HOME (no braces) for reliable env expansion by hyprlock's source handler.

# BACKGROUND
# Live desktop screenshot + internal blur.
# This makes hyprlock act as a layer directly on top of whatever is currently on screen,
# exactly like wlogout (live blur of the actual desktop instead of a static wallpaper).
background {
    path = screenshot
    blur_passes = 3
    blur_size = 2
    contrast = 0.78
    brightness = 0.52
    vibrancy = 0.05
    vibrancy_darkness = 0.35
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
# Styled to feel like wlogout buttons (dark semi-transparent card + accent border)
input-field {
    size = 20%, 5%
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = false
    
    outer_color = $primary
    inner_color = rgba(0, 0, 0 ,0)
    font_color = $on_surface
    

    fade_on_empty = true
    font_family = ShureTechMono Nerd Font
    placeholder_text = Input Password ...
    hide_input = false
    position = 0, -380
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:60000] date +"%H"
    color = $on_surface
    font_size = 220
    font_family = HeavyData Nerd Font
    position = 0,130
    halign = center
    valign = center
}
# Time
label {
    monitor =
    text = cmd[update:60000] date +"%M"
    color = $on_surface
    font_size = 220
    font_family = HeavyData Nerd Font
    position = 0, -90
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d %Y")"
    color = $on_surface_variant
    font_size = 30
    font_family = $font
    position = -50, 470
    halign = right
    valign = center
}

# Profile Photo (fixed path)
image {
    monitor =
    path = "$HOME/.config/hypr/hyprlock/user-img.png"
    border_color = 0xffdddddd
    border_size = 0
    size = 110
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -265
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = $on_surface_variant
    font_size = 20
    font_family = $font
    position = 0, -330
    halign = center
    valign = center
}

# WEATHERCAST & LOCATION
label {
    monitor      	=
    text        	= cmd[update:1000] echo "$(bash ~/.config/hypr/hyprlock/scripts/weather.sh)"

    shadow_passes       = 1
    shadow_boost        = 0.5

    color               = $on_surface_variant
    font_size           = 30
    font_family         = $font
    position            = 50, 470
    halign              = left
    valign              = center
}

