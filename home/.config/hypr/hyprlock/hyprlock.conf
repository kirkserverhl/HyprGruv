$CITY         		= Raleigh 
$COUNTRY      		= United States

# Source matugen colors so we can stay consistent with wlogout / starship rainbow
source = $HOME/.config/hypr/colors/custom/matugen.conf

# BACKGROUND
# Live desktop screenshot + internal blur.
# This makes hyprlock act as a layer directly on top of whatever is currently on screen,
# exactly like wlogout (live blur of the actual desktop instead of a static wallpaper).
background {
    path = screenshot
    blur_passes = 6
    blur_size = 8
    contrast = 0.78
    brightness = 0.52
    vibrancy = 0.05
    vibrancy_darkness = 0.35
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
# Styled to feel like wlogout buttons (dark semi-transparent card + accent border)
input-field {
    size = 260, 52
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = false
    outer_color = rgba(0, 0, 0, 0)
    inner_color = $surface_container_high
    font_color = $on_surface
    fade_on_empty = false
    font_family = "HeavyData Nerd Font Regular"
    placeholder_text = <span foreground="#e2e2e2" alpha="55%">Enter Password</span>
    hide_input = false
    position = 0, -425
    halign = center
    valign = center
}

# Time
label {
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = $on_surface
    font_size = 92
    font_family = "HeavyData Nerd Font Regular"
    position = 0, 310
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $on_surface_variant
    font_size = 28
    font_family = "Agave Nerd Font Propo Regular"
    position = 0, 400 
    halign = center
    valign = center
}

# Profile Photo (fixed path)
image {
    monitor =
    path = "$HOME/.config/hypr/hyprlock/user-img.png"
    border_color = 0xffdddddd
    border_size = 0
    size = 110
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -265
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = $on_surface_variant
    font_size = 20
    font_family = "HeavyData Nerd Font Regular"
    position = 0, -360
    halign = center
    valign = center
}

# CURRENT SONG (SPOTIFY ONLY)
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/hyprlock/scripts/spotify-playing.sh)" 
    color = $on_surface_variant
    font_size = 18
    font_family = "Agave Nerd Font Propo Regular"
    position = 100, 0
    halign = left
    valign = center
}

# WEATHERCAST & LOCATION
label {
    monitor      	=
    text        	= cmd[update:1000] echo "$(bash ~/.config/hypr/hyprlock/scripts/weather.sh)"

    shadow_passes       = 1
    shadow_boost        = 0.5

    color               = $on_surface_variant
    font_size           = 18
    font_family         = "Agave Nerd Font Propo Regular"

    position            = 95.5, -40
    halign              = left
    valign              = center
}

