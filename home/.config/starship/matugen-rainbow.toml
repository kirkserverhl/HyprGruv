# =============================================================================
# Starship Rainbow Prompt - Matugen version
# =============================================================================
# Powerline rainbow layout (gruvbox-rainbow structure) with matugen colors.
# Each segment carries its own leading arrow so empty sections stay hidden.
#
# Output: ~/.config/starship/matugen-rainbow.toml

format = """
[ŅéČ](color_orange)\
$os\
$username\
[Ņé░](bg:color_yellow fg:color_orange)\
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$pixi\
$time\
[Ņé┤ ](fg:color_bg1)\
$line_break$character"""

palette = 'matugen'

# =============================================================================
# Shared spectrum ŌĆö source (far left) + 4 palette columns (~/.config/matugen/spectrum.json)
# source ŌåÆ col1 ŌåÆ col2 ŌåÆ col3 ŌåÆ col4(bg3) ŌåÆ neutral(bg1)
# color_orange = source seed (base0f)
# =============================================================================
[palettes.matugen]
color_fg0 = '#d3c6aa'
color_bg1 = '#283036'
color_bg3 = '#7fbbb3'

color_orange = '#e69875'
color_yellow = '#e67e80'
color_aqua   = '#a7c080'
color_blue   = '#dbbc7f'

color_on_orange = '#14181b'
color_on_yellow = '#14181b'
color_on_aqua   = '#14181b'

color_green  = '#a7c080'
color_red    = '#e67e80'
color_purple = '#d699b6'

# =============================================================================
# OS
# =============================================================================
[os]
disabled = false
style = "bg:color_orange fg:color_on_orange"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
AOSC = "’īü"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "’ī¬"

# =============================================================================
# Username
# =============================================================================
[username]
show_always = true
style_user = "bg:color_orange fg:color_on_orange"
style_root = "bg:color_orange fg:color_on_orange"
format = '[ $user ]($style)'

# =============================================================================
# Directory (yellow segment)
# =============================================================================
[directory]
style = "fg:color_on_yellow bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

# =============================================================================
# Git (aqua segment) ŌĆö only renders inside a repo
# =============================================================================
[git_branch]
symbol = "’Éś"
style = "bg:color_aqua"
format = '[Ņé░](fg:color_yellow bg:color_aqua)[[ $symbol $branch ](fg:color_on_aqua bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_on_aqua bg:color_aqua)]($style)'

# =============================================================================
# Languages (blue segment) ŌĆö arrow only when a language is detected
# =============================================================================
[nodejs]
symbol = "Ņ£ś"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = "ŅØ»"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "Ņś× "
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "ŅśØ "
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "Ņśł"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "Ņē¢"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "Ņśå"
style = "bg:color_blue"
format = '[Ņé░](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# =============================================================================
# Environment / containers (bg3 segment)
# =============================================================================
[docker_context]
symbol = "’īł"
style = "bg:color_bg3"
format = '[Ņé░](fg:color_blue bg:color_bg3)[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# =============================================================================
# Time (neutral tail)
# =============================================================================
[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[Ņé░](fg:color_blue bg:color_bg1)[[ ’É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'

# =============================================================================
# Layout
# =============================================================================
[line_break]
disabled = false

# =============================================================================
# Prompt character
# =============================================================================
[character]
disabled = false
success_symbol = '[’É▓](bold fg:color_green)'
error_symbol = '[’É▓](bold fg:color_red)'
vimcmd_symbol = '[’É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[’É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[’É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[’É┤](bold fg:color_yellow)'