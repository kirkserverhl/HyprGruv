# =============================================================================
# Starship Rainbow Prompt - Matugen version
# =============================================================================
# This is a matugen template. It will be processed and written to
# ~/.config/starship/matugen-rainbow.toml on every wallpaper change.
#
# The visual structure (powerline segments + module order) is identical to
# gruvbox-rainbow.toml but all colors are dynamically pulled from matugen's
# Material You palette generated from your current wallpaper.
#
# To activate:
#   export STARSHIP_CONFIG="$HOME/.config/starship/matugen-rainbow.toml"
#   # or copy/symlink to ~/.config/starship.toml
#
# "$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'matugen'

# =============================================================================
# Dynamic Palette — Base16 semantic slots (Material You sources)
# Rainbow segment names follow gruvbox-rainbow layout; hues come from base09–0F.
# =============================================================================
[palettes.matugen]
color_fg0 = '#dde4e3'              # base05
color_bg1 = '#1a2121'       # base02
color_bg3 = '#161d1d'   # base01

color_orange = '#b5c7e9'             # base09 — orange slot
color_yellow = '#b1cccd'            # base0A — yellow slot
color_aqua   = '#364764'   # base0C — cyan slot
color_blue   = '#458588'         # base0F — gruv teal / blue slot

color_on_orange = '#090f10'
color_on_yellow = '#090f10'
color_on_aqua   = '#090f10'

color_green  = '#80d4d8'              # base0B — accent / prompt arrow
color_red    = '#ffb4ab'                # base08
color_purple = '#324b4c'  # base0E

# =============================================================================
# OS Segment
# =============================================================================
[os]
disabled = false
style = "bg:color_orange fg:color_on_orange"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

# =============================================================================
# Username
# =============================================================================
[username]
show_always = true
style_user = "bg:color_orange fg:color_on_orange"
style_root = "bg:color_orange fg:color_on_orange"
format = '[ $user ]($style)'

# =============================================================================
# Directory
# =============================================================================
[directory]
style = "fg:color_on_yellow bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_on_aqua bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_on_aqua bg:color_aqua)]($style)'

# =============================================================================
# Language Modules (blue segment)
# =============================================================================
[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# =============================================================================
# Environment / Container Modules (bg3 segment)
# =============================================================================
[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# =============================================================================
# Time (rightmost neutral segment)
# =============================================================================
[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

# =============================================================================
# Layout
# =============================================================================
[line_break]
disabled = false

# =============================================================================
# Prompt Character
# =============================================================================
[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
