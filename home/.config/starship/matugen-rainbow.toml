# =============================================================================
# Environment / containers (bg3 segment)
# =============================================================================
[docker_context]
symbol = "ïŒˆ"
style = "bg:color_bg3"
format = '[î‚°](fg:color_blue bg:color_bg3)[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# =============================================================================
# Time (neutral tail)
# =============================================================================
[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[î‚°](fg:color_blue bg:color_bg1)[[ ïگ؛ $time ](fg:color_fg0 bg:color_bg1)]($style)'

# =============================================================================
# Layout
# =============================================================================
[line_break]
disabled = false

# =============================================================================
# Prompt character
# =============================================================================
[character]
disabled = false
success_symbol = '[ïگ²](bold fg:color_green)'
error_symbol = '[ïگ²](bold fg:color_red)'
vimcmd_symbol = '[ïگ´](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_replace_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_visual_symbol = '[ïگ´](bold fg:color_yellow)'