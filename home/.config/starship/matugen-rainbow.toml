# =============================================================================
# Starship Rainbow Prompt - Matugen version
# =============================================================================
# Powerline rainbow layout (gruvbox-rainbow structure) with matugen colors.
# Each segment carries its own leading arrow so empty sections stay hidden.
#
# Output: ~/.config/starship/matugen-rainbow.toml

format = """
[î‚¶](color_orange)\
$os\
$username\
[î‚°](bg:color_yellow fg:color_orange)\
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$pixi\
$time\
[î‚´ ](fg:color_bg1)\
$line_break$character"""

palette = 'matugen'

# =============================================================================
# Rainbow palette â€” vivid accent slots (primary â†’ tertiary â†’ secondary â†’ container)
# =============================================================================
[palettes.matugen]
color_fg0 = '#e8e2d4'
color_bg1 = '#222017'
color_bg3 = '#2c2a21'

color_orange = '#d8c76f'
color_yellow = '#a8d0b5'
color_aqua   = '#d0c7a2'
color_blue   = '#524700'

color_on_orange = '#383000'
color_on_yellow = '#133724'
color_on_aqua   = '#363116'

color_green  = '#d0c7a2'
color_red    = '#ffb4ab'
color_purple = '#a8d0b5'

# =============================================================================
# OS
# =============================================================================
[os]
disabled = false
style = "bg:color_orange fg:color_on_orange"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = "ïŒ€"
Amazon = "ï‰°"
Android = "îœژ"
AOSC = "ïŒپ"
Arch = "َ°£‡"
Artix = "َ°£‡"
EndeavourOS = "ï†—"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"
Pop = "ïŒھ"

# =============================================================================
# Username
# =============================================================================
[username]
show_always = true
style_user = "bg:color_orange fg:color_on_orange"
style_root = "bg:color_orange fg:color_on_orange"
format = '[ $user ]($style)'

# =============================================================================
# Directory (yellow segment)
# =============================================================================
[directory]
style = "fg:color_on_yellow bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

# =============================================================================
# Git (aqua segment) â€” only renders inside a repo
# =============================================================================
[git_branch]
symbol = "ïگک"
style = "bg:color_aqua"
format = '[î‚°](fg:color_yellow bg:color_aqua)[[ $symbol $branch ](fg:color_on_aqua bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_on_aqua bg:color_aqua)]($style)'

# =============================================================================
# Languages (blue segment) â€” arrow only when a language is detected
# =============================================================================
[nodejs]
symbol = "îœک"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = "î‌¯"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "îک‍ "
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "îک‌ "
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "î‍¨"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "îک§"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "îکˆ"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "î‰–"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "îک´"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "îکں"
style = "bg:color_blue"
format = '[î‚°](fg:color_yellow bg:color_blue)[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
