[directory]
format = '[¯é░ ]($style)[$read_only](fg:primt bg:prim)[$repo_root]($repo_root_style)[$path](fg:primt bold bg:prim)'
style = 'fg:primt bg:prim'
home_symbol = '¯İù ~'
read_only = ' '
#read_only_style = 'fg: bg:'
truncation_length = 2
truncation_symbol = 'ÔÇĞ/'
truncate_to_repo = true
repo_root_format = '[ ´éø ](fg:primt bg:prim)[$read_only]($read_only_style)[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)'
repo_root_style  = 'fg:primt bold bg:prim'
use_os_path_sep = true
disabled = false

[directory.substitutions]
"Documents" = " "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
".config" = ".´Çô "

[git_branch]
format = '[¯éÂ](fg:bbg bg:bfg)[$symbol $branch(:$remote_branch)]($style)[¯é┤](fg:bbg bg:bfg)'
style = 'fg:bfg bold bg:bbg'
symbol = '¯£Ñ'
#ignore_branches = ['master', 'main']

[memory_usage]
