duration = ''
# Git Colors
bbg = '#3a3a3a' #GitHub branch background.
bfg = '#a7906f' #GitHub branch text.
# Chevrons
conflicted = 'red'
ahead = 'cyan'
behind = 'orange'
diverged = 'blue'
uptodate = 'green'
untracked = 'purple'
stashed =  '#6b84eb' #light blue
modified = 'yellow'
staged = '#c5e187' #sage
renamed = '#ce63ff' #lilac
deleted = '#f54caf' #pink

