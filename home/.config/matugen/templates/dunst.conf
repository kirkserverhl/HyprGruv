# Dunst notification daemon config
# Generated by Matugen from: {{image}}
# Base16 palette — do not edit manually.

[global]
monitor = 0
follow = mouse
width = 400
height = (0, 400)
origin = top-right
offset = (20, 20)
scale = 0
notification_limit = 3
progress_bar = true
progress_bar_height = 10
progress_bar_frame_width = 1
progress_bar_min_width = 150
progress_bar_max_width = 300
indicate_hidden = yes
transparency = 0
separator_height = 2
padding = 8
horizontal_padding = 8
text_icon_padding = 0
frame_width = 1
sort = yes
font = ShureTechMono Nerd Font 12
line_height = 0
markup = full
format = "<b>%s</b>\n%b"
alignment = left
vertical_alignment = center
show_age_threshold = 60
ellipsize = middle
ignore_newline = no
stack_duplicates = true
hide_duplicate_count = false
show_indicators = yes
icon_position = left
min_icon_size = 0
max_icon_size = 32
sticky_history = yes
history_length = 20
browser = /usr/bin/xdg-open
always_run_script = true
title = Dunst
class = Dunst
corner_radius = 8
ignore_dbusclose = false
force_xwayland = false
force_xinerama = false
mouse_left_click = close_current
mouse_middle_click = do_action, close_current
mouse_right_click = close_all

# ============================================
# Base16 colors
# ============================================

frame_color = "{{colors.primary.dark.hex}}"
highlight = "{{colors.primary.dark.hex}}"
separator_color = "{{colors.outline_variant.dark.hex}}"

# base03 — muted notification text
[urgency_low]
background = "{{colors.surface_container.dark.hex}}"
foreground = "{{colors.outline_variant.dark.hex}}"
frame_color = "{{colors.outline_variant.dark.hex}}"
highlight = "{{colors.tertiary.dark.hex}}"
timeout = 6

[urgency_normal]
background = "{{colors.surface_container_low.dark.hex}}"
foreground = "{{colors.on_surface.dark.hex}}"
frame_color = "{{colors.primary.dark.hex}}"
highlight = "{{colors.primary.dark.hex}}"
timeout = 8

# base08 — urgent / critical notifications (error)
[urgency_critical]
background = "{{colors.error.dark.hex}}"
foreground = "{{colors.surface_container_lowest.dark.hex}}"
frame_color = "{{colors.error.dark.hex}}"
highlight = "{{colors.error.dark.hex}}"
timeout = 0