# : App (terminal background via OSC 11) [[[

[app]
overall = { bg = "{{colors.surface_container_lowest.dark.hex}}" }

# : ]]]


# : Manager [[[

[mgr]
cwd = { fg = "{{colors.on_surface.dark.hex}}" }

# Find
find_keyword  = { fg = "{{colors.error.dark.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.error.dark.hex}}", bold = true, italic = true }

# Marker
marker_copied   = { fg = "{{colors.secondary.dark.hex}}", bg = "{{colors.secondary.dark.hex}}" }
marker_cut      = { fg = "{{colors.secondary.dark.hex}}", bg = "{{colors.secondary.dark.hex}}" }
marker_marked   = { fg = "{{colors.error.dark.hex}}", bg = "{{colors.error.dark.hex}}" }
marker_selected = { fg = "{{colors.tertiary.dark.hex}}", bg = "{{colors.tertiary.dark.hex}}" }

# Count
count_copied   = { fg = "{{colors.surface_container_lowest.dark.hex}}", bg = "{{colors.secondary.dark.hex}}" }
count_cut      = { fg = "{{colors.surface_container_lowest.dark.hex}}", bg = "{{colors.secondary.dark.hex}}" }
count_selected = { fg = "{{colors.surface_container_lowest.dark.hex}}", bg = "{{colors.tertiary.dark.hex}}" }

# Border
border_symbol = "│"
border_style  = { fg = "{{colors.on_surface_variant.dark.hex}}" }

# : ]]]


# : Indicator [[[

[indicator]
parent  = { fg = "{{colors.primary.dark.hex}}", bg = "{{colors.surface_container_lowest.dark.hex}}" }
current = { fg = "{{colors.tertiary.dark.hex}}", bg = "{{colors.surface_container_lowest.dark.hex}}" }
preview = { fg = "{{colors.secondary_container.dark.hex}}", bg = "{{colors.surface_container_lowest.dark.hex}}" }
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "{{colors.primary.dark.hex}}", bold = true, bg = "{{colors.surface_container_lowest.dark.hex}}" }
inactive  = { fg = "{{colors.secondary_container.dark.hex}}", bg = "{{colors.surface_container_lowest.dark.hex}}" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "{{colors.primary.dark.hex}}", fg = "{{colors.surface_container_lowest.dark.hex}}", bold = true }
normal_alt  = { bg = "{{colors.surface_container_low.dark.hex}}", fg = "{{colors.outline_variant.dark.hex}}" }  # base03 muted

# Select mode
select_main = { bg = "{{colors.secondary_container.dark.hex}}", fg = "{{colors.surface_container_lowest.dark.hex}}", bold = true }
select_alt  = { bg = "{{colors.surface_container_low.dark.hex}}", fg = "{{colors.outline_variant.dark.hex}}" }

# Unset mode
unset_main = { bg = "{{colors.tertiary.dark.hex}}", fg = "{{colors.surface_container_lowest.dark.hex}}", bold = true }
unset_alt  = { bg = "{{colors.surface_container_low.dark.hex}}", fg = "{{colors.outline_variant.dark.hex}}" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "{{colors.secondary_container.dark.hex}}" }
perm_write = { fg = "{{colors.tertiary.dark.hex}}" }
perm_read  = { fg = "{{colors.error.dark.hex}}" }
perm_exec  = { fg = "{{colors.secondary.dark.hex}}" }
perm_sep   = { fg = "{{colors.primary.dark.hex}}" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "{{colors.primary.dark.hex}}", bg = "{{colors.surface_bright.dark.hex}}" }
progress_error  = { fg = "{{colors.error.dark.hex}}", bg = "{{colors.surface_bright.dark.hex}}" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "{{colors.surface_bright.dark.hex}}" }
cand = { fg = "{{colors.primary.dark.hex}}" }
rest = { fg = "{{colors.surface_container_lowest.dark.hex}}" }
desc = { fg = "{{colors.on_surface.dark.hex}}" }
separator = " ▶ "
separator_style = { fg = "{{colors.on_surface.dark.hex}}" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "{{colors.tertiary.dark.hex}}" }
title_warn  = { fg = "{{colors.primary.dark.hex}}" }
title_error = { fg = "{{colors.error.dark.hex}}" }  # base08 — urgent notifications

# : ]]]


# : Picker [[[

[pick]
border = { fg = "{{colors.primary.dark.hex}}" }
active = { fg = "{{colors.tertiary.dark.hex}}", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "{{colors.primary.dark.hex}}" }
value  = { fg = "{{colors.on_surface.dark.hex}}" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "{{colors.primary.dark.hex}}", bg = "{{colors.surface_container_lowest.dark.hex}}" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "{{colors.primary.dark.hex}}" }
title   = {}
hovered = { fg = "{{colors.secondary.dark.hex}}", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "{{colors.on_surface.dark.hex}}" }
run    = { fg = "{{colors.on_surface.dark.hex}}" }
footer = { fg = "{{colors.surface_container_lowest.dark.hex}}", bg = "{{colors.secondary_container.dark.hex}}" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "{{colors.tertiary.dark.hex}}" },

    # Media
    { mime = "{audio,video}/*", fg = "{{colors.secondary.dark.hex}}" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "{{colors.secondary_container.dark.hex}}" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "{{colors.primary.dark.hex}}" },

    # Special files
    { url = "*", is = "orphan", bg = "{{colors.error.dark.hex}}" },
    { url = "*", is = "exec", fg = "{{colors.surface_container_lowest.dark.hex}}" },

    # Fallback
    { url = "*", fg = "{{colors.on_surface.dark.hex}}" },
    { url = "*/", fg = "{{colors.on_surface_variant.dark.hex}}" },
]

# : ]]]
# Icons: appended by reload-yazi-theme.sh (matugen tint or preset palette)
