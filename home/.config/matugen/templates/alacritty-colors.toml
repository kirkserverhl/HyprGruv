# Alacritty colors generated by matugen (Base16)
# Output target: ~/.config/alacritty/colors/matugen.toml

[colors.primary]
background = "{{colors.surface_container_lowest.dark.hex}}"
foreground = "{{colors.on_surface.dark.hex}}"

[colors.cursor]
cursor = "{{colors.primary.dark.hex}}"
text = "{{colors.surface_container_lowest.dark.hex}}"

[colors.selection]
text = "{{colors.inverse_on_surface.dark.hex}}"
background = "{{colors.surface_container.dark.hex}}"

[colors.normal]
black = "{{colors.surface_container_lowest.dark.hex}}"
red = "{{colors.error.dark.hex}}"
green = "{{colors.primary.dark.hex}}"
yellow = "{{colors.secondary.dark.hex}}"
blue = "{{colors.primary.dark.hex}}"
magenta = "{{colors.secondary_container.dark.hex}}"
cyan = "{{colors.tertiary_container.dark.hex}}"
white = "{{colors.on_surface.dark.hex}}"

[colors.bright]
black = "{{colors.outline_variant.dark.hex}}"
red = "{{colors.error.dark.hex}}"
green = "{{colors.primary.dark.hex}}"
yellow = "{{colors.secondary.dark.hex}}"
blue = "{{colors.primary.dark.hex}}"
magenta = "{{colors.secondary_container.dark.hex}}"
cyan = "{{colors.tertiary_container.dark.hex}}"
white = "{{colors.surface_bright.dark.hex}}"