[python]
symbol = "¯İå"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# =============================================================================
# Environment / Container Modules (bg3 segment)
# =============================================================================
[docker_context]
symbol = "´îê"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# =============================================================================
# Time (rightmost neutral segment)
# =============================================================================
[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ´É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'

# =============================================================================
# Layout
# =============================================================================
[line_break]
disabled = false

# =============================================================================
# Prompt Character
# =============================================================================
[character]
disabled = false
success_symbol = '[´É▓](bold fg:color_green)'
error_symbol = '[´É▓](bold fg:color_red)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[´É┤](bold fg:color_yellow)'
