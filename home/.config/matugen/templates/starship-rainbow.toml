# =============================================================================
# Starship Rainbow Prompt - Matugen version
# =============================================================================
# This is a matugen template. It will be processed and written to
# ~/.config/starship/matugen-rainbow.toml on every wallpaper change.
#
# The visual structure (powerline segments + module order) is identical to
# gruvbox-rainbow.toml but all colors are dynamically pulled from matugen's
# Material You palette generated from your current wallpaper.
#
# To activate:
#   export STARSHIP_CONFIG="$HOME/.config/starship/matugen-rainbow.toml"
#   # or copy/symlink to ~/.config/starship.toml
#
# "$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](color_orange)\
$os\
$username\
[¯é░](bg:color_yellow fg:color_orange)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[¯é░](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[¯é░](fg:color_bg3 bg:color_bg1)\
$time\
[¯é┤ ](fg:color_bg1)\
$line_break$character"""

palette = 'matugen'

# =============================================================================
# Dynamic Palette ÔÇö Base16 semantic slots (Material You sources)
# Rainbow segment names follow gruvbox-rainbow layout; hues come from base09ÔÇô0F.
# =============================================================================
[palettes.matugen]
color_fg0 = '{{colors.on_surface.dark.hex}}'              # base05
color_bg1 = '{{colors.surface_container.dark.hex}}'       # base02
color_bg3 = '{{colors.surface_container_low.dark.hex}}'   # base01

color_orange = '{{colors.tertiary.dark.hex}}'             # base09 ÔÇö orange slot
color_yellow = '{{colors.secondary.dark.hex}}'            # base0A ÔÇö yellow slot
color_aqua   = '{{colors.tertiary_container.dark.hex}}'   # base0C ÔÇö cyan slot
color_blue   = '{{colors.source_color.dark.hex}}'         # base0F ÔÇö gruv teal / blue slot

color_on_orange = '{{colors.surface_container_lowest.dark.hex}}'
color_on_yellow = '{{colors.surface_container_lowest.dark.hex}}'
color_on_aqua   = '{{colors.surface_container_lowest.dark.hex}}'

color_green  = '{{colors.primary.dark.hex}}'              # base0B ÔÇö accent / prompt arrow
color_red    = '{{colors.error.dark.hex}}'                # base08
color_purple = '{{colors.secondary_container.dark.hex}}'  # base0E

# =============================================================================
# OS Segment
# =============================================================================
[os]
disabled = false
style = "bg:color_orange fg:color_on_orange"

[os.symbols]
Windows = "¾░ı▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "´åù"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "´î¬"

# =============================================================================
# Username
# =============================================================================
[username]
show_always = true
style_user = "bg:color_orange fg:color_on_orange"
style_root = "bg:color_orange fg:color_on_orange"
format = '[ $user ]($style)'

# =============================================================================
# Directory
# =============================================================================
[directory]
style = "fg:color_on_yellow bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = "´Éİ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_on_aqua bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_on_aqua bg:color_aqua)]($style)'

# =============================================================================
# Language Modules (blue segment)
# =============================================================================
[nodejs]
symbol = "¯£İ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = "¯Ø»"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "¯İŞ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "¯İØ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "¯Ş¿"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "¯İğ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "¯İê"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "¯ëû"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "¯İ┤"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "¯İş"
style = "bg:color_blue"
