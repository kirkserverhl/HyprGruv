# Minimal matugen config — yazi flavor switch only (no theme.toml generation).
# Used by reload-yazi-theme.sh legacy callers; flavors replaced matugen templates.

[config]
block_prefix = "<*"
block_postfix = "*>"

[templates.yazi]
post_hook = "~/.config/hyprgruv/scripts/reload-yazi-theme.sh --switch"