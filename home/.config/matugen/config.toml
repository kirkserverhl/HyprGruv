output_path = "~/.config/waypaper/colors/matugen.css"
post_hook = "~/.config/settings/waypaper-rebuild-style.sh"


[templates.wlogout]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/wlogout/colors.css"


# Yazi uses flavors (see ~/.config/yazi/flavors/) — switched by reload-yazi-theme.sh.
# Matugen no longer overwrites theme.toml (that caused washed-out Material You colors).
# Yazi reload runs from reload-matugen-visible.sh instead (no matugen template needed).

[templates.grok]
input_path = "~/.config/matugen/templates/grok-theme.toml"
output_path = "~/.grok/themes/matugen.toml"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-grok.sh"

# Neovim (Material You via mini.base16)

# -----------------------------------------------------------------------------
# Global post-processing
# -----------------------------------------------------------------------------
run_after = [
  ["~/.local/bin/matugen-posthook", "{{image}}"]
]


