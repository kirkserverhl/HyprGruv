output_path = "~/.config/alacritty/colors/matugen.toml"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-terminal.sh"


[templates.ghostty]
input_path = "~/.config/matugen/templates/ghostty-colors.conf"
output_path = "~/.config/ghostty/colors/matugen.conf"
# Ghostty has no reliable external reload signal from CLI in current versions.
# Press ctrl+shift+, inside Ghostty (or bind a global hotkey) to reload after theme changes.
post_hook = "true"


[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-3.0/colors.css"
post_hook = '~/.config/hyprgruv/scripts/matugen-posthook-gtk-theme.sh'


[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-4.0/colors.css"


[templates.hypremoji]
input_path = "~/.config/matugen/templates/hypremoji.css"
output_path = "~/.config/hypremoji/matugen.css"


[templates.hyprlock]
input_path = "~/.config/matugen/templates/hyprlock-colors.conf"
output_path = "~/.config/hypr/hyprlock/colors/matugen.conf"
# No post_hook — hyprlock isn't usually running when you change wallpapers


[templates.kvantum_kvconfig]
input_path = "~/.config/matugen/templates/kvantum-colors.kvconfig"
output_path = "~/.config/Kvantum/matugen/matugen.kvconfig"
post_hook = "~/.config/hyprgruv/scripts/sync-kde-qt-theme.sh"

[templates.kvantum_svg]
input_path = "~/.config/matugen/templates/kvantum-colors.svg"
output_path = "~/.config/Kvantum/matugen/matugen.svg"
post_hook = "~/.config/hyprgruv/scripts/sync-kde-qt-theme.sh"


[templates.neovim]
input_path = "~/.config/matugen/templates/neovim-mini.lua"
output_path = "~/.config/nvim/lua/matugen-theme.lua"
post_hook = 'pkill -SIGUSR1 nvim 2>/dev/null || true'

# Starship prompt - rainbow powerline structure using matugen colors

[templates.obs]
input_path = "~/.config/matugen/templates/matugen.obt"
output_path = "~/.config/obs-studio/themes/matugen.obt"


# -----------------------------------------------------------------------------
# Qt / Kvantum / KDE apps (KWrite, Kate, Dolphin, etc.)
# -----------------------------------------------------------------------------

[templates.obsidian]
input_path = "~/.config/matugen/templates/obsidian.css"
output_path = "~/.config/obsidian/matugen.css"
post_hook = '''
    OBS_CSS="$HOME/.config/obsidian/matugen.css"
    for vault in \
        "$HOME/Documents/Obsidian" \
        "$HOME/Obsidian" \
        "$HOME/vaults" \
        "$HOME/Documents/hyprcourse/Hyprland"; do
        if [ -d "$vault/.obsidian" ]; then
            mkdir -p "$vault/.obsidian/snippets"
            cp "$OBS_CSS" "$vault/.obsidian/snippets/matugen.css"
            python3 - "$vault/.obsidian/appearance.json" <<'PY'
import json, sys, os

path = sys.argv[1]
text_font = os.environ.get("FONT_TEXT", "ShureTechMono Nerd Font")
ui_font = os.environ.get("FONT_UI", "Agave Nerd Font Propo")
data = {}
if os.path.isfile(path):
    with open(path, encoding="utf-8") as f:
        try:
            data = json.load(f)
        except json.JSONDecodeError:
            data = {}

data["textFontFamily"] = text_font
data["interfaceFontFamily"] = ui_font
data["monospaceFontFamily"] = text_font

snippets = list(data.get("enabledCssSnippets") or [])
if "matugen" in snippets:
    snippets.remove("matugen")
data["enabledCssSnippets"] = snippets
with open(path, "w", encoding="utf-8") as f:
    json.dump(data, f, indent=2)
    f.write("\n")

snippets.append("matugen")
data["enabledCssSnippets"] = snippets
if not data.get("theme"):
    data["theme"] = "obsidian"
with open(path, "w", encoding="utf-8") as f:
    json.dump(data, f, indent=2)
    f.write("\n")
PY
            echo "[matugen] Copied Obsidian theme to $vault (snippet toggled for reload)"
        fi
    done
'''


[templates.pavucontrol]
input_path = "~/.config/matugen/templates/pavucontrol.css"
output_path = "~/.config/pavucontrol/pavucontrol.css"


[templates.qt5ct]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"
post_hook = "~/.config/hyprgruv/scripts/sync-kde-qt-theme.sh"


