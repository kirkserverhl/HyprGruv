output_path = "~/.mozilla/firefox/vfpa7t0f.default-release/chrome/websites/github.css"


[templates.firefox_website_colors]
input_path = "~/.config/matugen/templates/firefox-colors.css"
output_path = "~/.mozilla/firefox/vfpa7t0f.default-release/chrome/colors.css"


[templates.firefox_youtube]
