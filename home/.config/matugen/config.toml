# =============================================================================
# Matugen Configuration
# =============================================================================
# Templates are stored in ~/.config/matugen/templates/
# Run: matugen image /path/to/wallpaper
#
# Post-processing (reloading apps) is handled via per-template post_hook
# and the global run_after below.

[config]
# No custom keyword mappings after 2026 cleanup.
# Templates use full paths like {{colors.primary.default.hex}}.

# -----------------------------------------------------------------------------
# Wallpaper setter (optional, used when "set" is true)
# -----------------------------------------------------------------------------
[image]
command = "awww"
arguments = ["img", "--transition-type", "center", "--transition-duration", "1"]
set = true

# -----------------------------------------------------------------------------
# Templates
# -----------------------------------------------------------------------------

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-3.0/colors.css"
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk-colors.css"
output_path = "~/.config/gtk-4.0/colors.css"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors.conf"
post_hook = "kill -SIGUSR1 $(pidof kitty 2>/dev/null) 2>/dev/null || true"  # Kitty official reload signal

[templates.ghostty]
input_path = "~/.config/matugen/templates/ghostty-colors.conf"
output_path = "~/.config/ghostty/colors/matugen.conf"
# Ghostty has no reliable external reload signal from CLI in current versions.
# Press ctrl+shift+, inside Ghostty (or bind a global hotkey) to reload after theme changes.
post_hook = "notify-send -a matugen 'Ghostty' 'Theme updated — reload with ctrl+shift+,' 2>/dev/null || true"

[templates.waybar]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/waybar/colors/matugen.css"
post_hook = "pkill -SIGUSR2 waybar 2>/dev/null || true"  # waybar reloads on SIGUSR2

[templates.pywalfox]
input_path = "~/.config/matugen/templates/pywalfox-colors.json"
output_path = "~/.cache/wal/colors.json"
post_hook = "pywalfox update"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi-colors.rasi"
output_path = "~/.config/rofi/colors.rasi"

[templates.fuzzel]
input_path = "~/.config/matugen/templates/fuzzel.ini"
output_path = "~/.config/fuzzel/colors.ini"

[templates.hypremoji]
input_path = "~/.config/matugen/templates/hypremoji.css"
output_path = "~/.config/hypremoji/matugen.css"

[templates.chrome-user]
input_path = "~/.config/matugen/templates/chrome.user.css"
output_path = "~/.config/chrome/matugen-theme.user.css"

[templates.wlogout]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/wlogout/colors.css"

[templates.pavucontrol]
input_path = "~/.config/matugen/templates/pavucontrol.css"
output_path = "~/.config/pavucontrol/pavucontrol.css"

[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors/custom/matugen.conf"
post_hook = "hyprctl reload"

# Dedicated colors for hyprlock (clean separation from main Hyprland colors)
[templates.hyprlock]
input_path = "~/.config/matugen/templates/hyprlock-colors.conf"
output_path = "~/.config/hypr/hyprlock/colors/matugen.conf"
# No post_hook — hyprlock isn't usually running when you change wallpapers

[templates.dunst]
input_path = "~/.config/matugen/templates/dunst.conf"
output_path = "~/.config/dunst/dunstrc"
post_hook = 'killall dunst 2>/dev/null; dunst &'

[templates.yazi]
input_path = "~/.config/matugen/templates/yazi-theme.toml"
output_path = "~/.config/yazi/theme.toml"

# Neovim (Material You via mini.base16)
[templates.neovim]
input_path = "~/.config/matugen/templates/neovim-mini.lua"
output_path = "~/.config/nvim/lua/matugen-theme.lua"
post_hook = 'pkill -SIGUSR1 nvim 2>/dev/null || true'

# Starship prompt - rainbow powerline structure using matugen colors
[templates.starship_rainbow]
input_path = "~/.config/matugen/templates/starship-rainbow.toml"
output_path = "~/.config/starship/matugen-rainbow.toml"
post_hook = 'echo "[matugen] starship-rainbow template processed for $(basename "{{image}}")" >> ~/.cache/matugen.log'

# Terminal OSC color sequences (applied in .zshrc)
[templates.terminal_sequences]
input_path = "~/.config/matugen/templates/terminal-sequences"
output_path = "~/.config/terminal-sequences"
# No heavy post_hook needed — new shells will pick it up automatically
post_hook = 'notify-send "Matugen" "Terminal colors updated" 2>/dev/null || true'

[templates.btop]
input_path = "~/.config/matugen/templates/btop.theme"
output_path = "~/.config/btop/themes/matugen.theme"
post_hook = '''
    # Also provide for bpytop (uses same .theme format)
    mkdir -p "$HOME/.config/bpytop/themes"
    cp "~/.config/btop/themes/matugen.theme" "$HOME/.config/bpytop/themes/matugen.theme"

    # Update configs to use the new theme
    sed -i 's/^color_theme = .*/color_theme = "matugen"/' "$HOME/.config/btop/btop.conf" 2>/dev/null || true
    sed -i 's/^color_theme=".*"/color_theme="+matugen"/' "$HOME/.config/bpytop/bpytop.conf" 2>/dev/null || true

    notify-send "Matugen" "btop / bpytop theme updated" 2>/dev/null || true
'''

[templates.obsidian]
input_path = "~/.config/matugen/templates/obsidian.css"
output_path = "~/.config/obsidian/matugen.css"
post_hook = '''
    # Copy to known vaults (add more paths as needed)
    for vault in \
        "$HOME/Documents/Obsidian" \
        "$HOME/Obsidian" \
        "$HOME/vaults" \
        "$HOME/Documents/hyprcourse/Hyprland"; do
        if [ -d "$vault/.obsidian" ]; then
            mkdir -p "$vault/.obsidian/snippets"
            cp "~/.config/obsidian/matugen.css" "$vault/.obsidian/snippets/matugen.css"
            echo "[matugen] Copied Obsidian theme to $vault"
        fi
    done
    notify-send "Matugen" "Obsidian theme updated" 2>/dev/null || true
'''

[templates.firefox]
input_path = "~/.config/matugen/templates/firefox-colors.css"
output_path = "~/.mozilla/firefox/vfpa7t0f.default-release/chrome/userChrome.css"
# post_hook disabled — too aggressive. Reload Firefox manually or use its devtools.

[templates.waypaper]
input_path = "~/.config/matugen/templates/waypaper-style.css"
output_path = "~/.config/waypaper/style.css"
# Note: Waypaper may need to be restarted to pick up the new stylesheet

# -----------------------------------------------------------------------------
# Canonical semantic palette (Starship-inspired)
# This is the single importable source of truth for most custom themes.
# Written to a stable location so waybar, hyprland, fuzzel, etc. can @import it.
# -----------------------------------------------------------------------------
[templates.semantic_palette]
input_path = "~/.config/matugen/templates/base-palette.css"
output_path = "~/.config/matugen/palette.css"
post_hook = 'echo "[matugen] semantic palette updated" >> ~/.cache/matugen.log'

[templates.bat]
input_path = "~/.config/matugen/templates/bat.tmTheme"
output_path = "~/.config/bat/themes/Matugen.tmTheme"
post_hook = 'bat cache --build 2>/dev/null; notify-send "Matugen" "bat theme updated" 2>/dev/null || true'

# -----------------------------------------------------------------------------
# Qt / Kvantum / KDE apps (KWrite, Kate, Dolphin, etc.)
# -----------------------------------------------------------------------------
[templates.kvantum_kvconfig]
input_path = "~/.config/matugen/templates/archive/kvantum-colors.kvconfig"
output_path = "~/.config/Kvantum/matugen/matugen.kvconfig"

[templates.kvantum_svg]
input_path = "~/.config/matugen/templates/archive/kvantum-colors.svg"
output_path = "~/.config/Kvantum/matugen/matugen.svg"

[templates.qt6ct]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"
post_hook = 'notify-send "Matugen" "qt6ct colors updated — restart Qt apps" 2>/dev/null || true'

[templates.qt5ct]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"
post_hook = 'notify-send "Matugen" "qt5ct colors updated — restart Qt apps" 2>/dev/null || true'

# Optional but useful for some KDE apps
[templates.kde_colors]
input_path = "~/.config/matugen/templates/archive/Matugen.colors"
output_path = "~/.local/share/color-schemes/Matugen.colors"

# -----------------------------------------------------------------------------
# Global post-processing
# -----------------------------------------------------------------------------
run_after = [
  ["~/.local/bin/matugen-posthook", "{{image}}"]
]

