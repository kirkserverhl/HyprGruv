# =============================================================================
# Matugen Configuration
# =============================================================================
# Templates are stored in ~/.config/matugen/templates/
# Run: matugen image /path/to/wallpaper
#
# Post-processing (reloading apps) is handled via per-template post_hook
# and the global run_after below.

[config]
# Base16-first templates (2026 cleanup).
# Slots base00–base0f are mapped from Material You roles in each template.
# See templates/base16-colors.css for the canonical shade/accent assignment.
# Block syntax for quickshell templates (quickshell.json / quickshell.qml).
block_prefix = "<*"
block_postfix = "*>"

# -----------------------------------------------------------------------------
# Wallpaper setter (optional, used when "set" is true)
# -----------------------------------------------------------------------------
[image]
command = "awww"
arguments = ["img", "--transition-type", "center", "--transition-duration", "1"]
set = false

# -----------------------------------------------------------------------------
# Templates
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Templates — priority first (most visible on wallpaper change):
#   kitty → hyprland → starship → waybar → terminal_sequences
# Each has a focused post_hook in ~/.config/hyprgruv/scripts/matugen-posthook-*.sh
# Cache hits use reload-matugen-visible.sh to run the same hooks without re-exporting.
# -----------------------------------------------------------------------------

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors/custom/matugen.conf"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-terminal.sh"


[templates.hyprland]
input_path = "~/.config/matugen/templates/hyprland-colors.conf"
output_path = "~/.config/hypr/colors/custom/matugen.conf"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-hyprland.sh"

# Dedicated colors for hyprlock (clean separation from main Hyprland colors)

[templates.starship_rainbow]
input_path = "~/.config/matugen/templates/starship-rainbow.toml"
output_path = "~/.config/starship/matugen-rainbow.toml"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-starship.sh"

# Terminal OSC color sequences (applied in .zshrc on new shells + live via reload-stamp)

[templates.waybar]
input_path = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/waybar/colors/matugen-waybar.css"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-waybar.sh"

## Legacy waybarstar template — input file never existed; waybar uses colors.css → matugen-waybar.css
##[templates.waybarstar]
##input_path = "~/.config/matugen/templates/waybar-style.css"
##output_path = "~/.config/waybar/colors/matugen.css"
##post_hook = "true"

[templates.terminal_sequences]
input_path = "~/.config/matugen/templates/terminal-sequences"
output_path = "~/.config/terminal-sequences"
post_hook = "~/.config/hyprgruv/scripts/matugen-posthook-terminal.sh"


[templates.bat]
input_path = "~/.config/matugen/templates/bat.tmTheme"
output_path = "~/.config/bat/themes/Matugen.tmTheme"
post_hook = 'bat cache --build 2>/dev/null'


[templates.btop]
input_path = "~/.config/matugen/templates/btop.theme"
output_path = "~/.config/btop/themes/matugen.theme"
post_hook = '''
    # Also provide for bpytop (uses same .theme format)
    mkdir -p "$HOME/.config/bpytop/themes"
    cp "~/.config/btop/themes/matugen.theme" "$HOME/.config/bpytop/themes/matugen.theme"

    # Update configs to use the new theme
    sed -i 's/^color_theme = .*/color_theme = "matugen"/' "$HOME/.config/btop/btop.conf" 2>/dev/null || true
    sed -i 's/^color_theme=".*"/color_theme="+matugen"/' "$HOME/.config/bpytop/bpytop.conf" 2>/dev/null || true
'''


[templates.pacseek]
input_path = "~/.config/matugen/templates/pacseek-colors.json"
output_path = "~/.config/pacseek/colors.json"
post_hook = '''
    cfg="$HOME/.config/pacseek/config.json"
    if [[ -f "$cfg" ]] && command -v python3 >/dev/null 2>&1; then
        python3 - "$cfg" <<'PY'
import json, sys
path = sys.argv[1]
with open(path, encoding="utf-8") as f:
    data = json.load(f)
data["ColorScheme"] = "Custom"
data["Transparent"] = True
with open(path, "w", encoding="utf-8") as f:
    json.dump(data, f, indent="\t")
    f.write("\n")
PY
    fi
'''

[templates.cava]
input_path = "~/.config/matugen/templates/cava-colors.ini"
output_path = "~/.config/cava/themes/matugen"
post_hook = "pkill -USR1 cava 2>/dev/null || true"


[templates.chrome-user]
input_path = "~/.config/matugen/templates/chrome.user.css"
output_path = "~/.config/chrome/matugen-theme.user.css"


[templates.swaync]
