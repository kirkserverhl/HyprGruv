# : Manager [[[

[mgr]
cwd = { fg = "#f0dfd7" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#d2cc5c", bg = "#d2cc5c" }
marker_cut      = { fg = "#e8e5ac", bg = "#e8e5ac" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#cbc992", bg = "#cbc992" }

# Count
count_copied   = { fg = "#1d1d00", bg = "#e8e5ac" }
count_cut      = { fg = "#1d1d00", bg = "#e8e5ac" }
count_selected = { fg = "#522300", bg = "#cbc992" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb68a" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#ffb68a", bold = true, bg = "#1a120d" }
inactive  = { fg = "#e5bfa9", bg = "#1a120d" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#ffb68a", fg = "#522300", bold = true }
normal_alt  = { bg = "#52443c", fg = "#d7c2b8" }

# Select mode
select_main = { bg = "#e5bfa9", fg = "#432b1c", bold = true }
select_alt  = { bg = "#52443c", fg = "#d7c2b8" }

# Unset mode
unset_main = { bg = "#cbc992", fg = "#333209", bold = true }
unset_alt  = { bg = "#52443c", fg = "#d7c2b8" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#bc6939" }
perm_write = { fg = "#85823f" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#c5bd36" }
perm_sep   = { fg = "#ff772f" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#ffb68a", bg = "#413732" }
progress_error  = { fg = "#ffb4ab", bg = "#413732" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#413732" }
cand = { fg = "#ffb68a" }
rest = { fg = "#522300" }
desc = { fg = "#f0dfd7" }
separator = " ▶ "
separator_style = { fg = "#f0dfd7" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#cbc992" }
title_warn  = { fg = "#ffb68a" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#ffb68a" }
active = { fg = "#cbc992", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb68a" }
value  = { fg = "#f0dfd7" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#ffb68a", bg = "#522300" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#ffb68a" }
title   = {}
hovered = { fg = "#e8e5ac", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#f0dfd7" }
run    = { fg = "#f0dfd7" }
footer = { fg = "#432b1c", bg = "#e5bfa9" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#f0dfd7" },
    { url = "*/", fg = "#ffb68a" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#ffb68a" },
	{ if = "link", text = "", fg = "#ffb68a" },
	{ if = "block", text = "", fg = "#ffb68a" },
	{ if = "char", text = "", fg = "#ffb68a" },
	{ if = "fifo", text = "", fg = "#ffb68a" },
	{ if = "sock", text = "", fg = "#ffb68a" },
	{ if = "sticky", text = "", fg = "#ffb68a" },
	{ if = "dummy", text = "", fg = "#ffb68a" },

	# Fallback
	{ if = "dir", text = "", fg = "#ffb68a" },
	{ if = "exec", text = "", fg = "#ffb68a" },
	{ if = "!dir", text = "", fg = "#ffb68a" },
]
# : }}}
