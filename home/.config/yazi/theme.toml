# : Manager [[[

[mgr]
cwd = { fg = "#dee3e5" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#768aff", bg = "#768aff" }
marker_cut      = { fg = "#dce1ff", bg = "#dce1ff" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#bdc5eb", bg = "#bdc5eb" }

# Count
count_copied   = { fg = "#111a37", bg = "#dce1ff" }
count_cut      = { fg = "#111a37", bg = "#dce1ff" }
count_selected = { fg = "#00363f", bg = "#bdc5eb" }

# Border
border_symbol = "│"
border_style  = { fg = "#83d2e4" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#83d2e4", bold = true, bg = "#0e1416" }
inactive  = { fg = "#b2cbd1", bg = "#0e1416" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#83d2e4", fg = "#00363f", bold = true }
normal_alt  = { bg = "#3f484b", fg = "#bfc8cb" }

# Select mode
select_main = { bg = "#b2cbd1", fg = "#1c3439", bold = true }
select_alt  = { bg = "#3f484b", fg = "#bfc8cb" }

# Unset mode
unset_main = { bg = "#bdc5eb", fg = "#272f4d", bold = true }
unset_alt  = { bg = "#3f484b", fg = "#bfc8cb" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#588792" }
perm_write = { fg = "#485ec7" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#435eff" }
perm_sep   = { fg = "#0cd1ff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#83d2e4", bg = "#343a3c" }
progress_error  = { fg = "#ffb4ab", bg = "#343a3c" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#343a3c" }
cand = { fg = "#83d2e4" }
rest = { fg = "#00363f" }
desc = { fg = "#dee3e5" }
separator = " ▶ "
separator_style = { fg = "#dee3e5" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#bdc5eb" }
title_warn  = { fg = "#83d2e4" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#83d2e4" }
active = { fg = "#bdc5eb", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#83d2e4" }
value  = { fg = "#dee3e5" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#83d2e4", bg = "#00363f" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#83d2e4" }
title   = {}
hovered = { fg = "#dce1ff", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#dee3e5" }
run    = { fg = "#dee3e5" }
footer = { fg = "#1c3439", bg = "#b2cbd1" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#dee3e5" },
    { url = "*/", fg = "#83d2e4" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#83d2e4" },
	{ if = "link", text = "", fg = "#83d2e4" },
	{ if = "block", text = "", fg = "#83d2e4" },
	{ if = "char", text = "", fg = "#83d2e4" },
	{ if = "fifo", text = "", fg = "#83d2e4" },
	{ if = "sock", text = "", fg = "#83d2e4" },
	{ if = "sticky", text = "", fg = "#83d2e4" },
	{ if = "dummy", text = "", fg = "#83d2e4" },

	# Fallback
	{ if = "dir", text = "", fg = "#83d2e4" },
	{ if = "exec", text = "", fg = "#83d2e4" },
	{ if = "!dir", text = "", fg = "#83d2e4" },
]
# : }}}
