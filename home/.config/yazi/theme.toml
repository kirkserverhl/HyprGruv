# : Manager [[[

[mgr]
cwd = { fg = "#eae1d4" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#83d07c", bg = "#83d07c" }
marker_cut      = { fg = "#caebc7", bg = "#caebc7" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#aecfac", bg = "#aecfac" }

# Count
count_copied   = { fg = "#05210a", bg = "#caebc7" }
count_cut      = { fg = "#05210a", bg = "#caebc7" }
count_selected = { fg = "#3e2e00", bg = "#aecfac" }

# Border
border_symbol = "│"
border_style  = { fg = "#e5c36c" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#e5c36c", bold = true, bg = "#16130b" }
inactive  = { fg = "#d6c5a0", bg = "#16130b" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#e5c36c", fg = "#3e2e00", bold = true }
normal_alt  = { bg = "#4c4639", fg = "#cfc5b4" }

# Select mode
select_main = { bg = "#d6c5a0", fg = "#392f15", bold = true }
select_alt  = { bg = "#4c4639", fg = "#cfc5b4" }

# Unset mode
unset_main = { bg = "#aecfac", fg = "#1b361e", bold = true }
unset_alt  = { bg = "#4c4639", fg = "#cfc5b4" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#9a7f43" }
perm_write = { fg = "#568f53" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#5fc356" }
perm_sep   = { fg = "#f9af00" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#e5c36c", bg = "#3d392f" }
progress_error  = { fg = "#ffb4ab", bg = "#3d392f" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3d392f" }
cand = { fg = "#e5c36c" }
rest = { fg = "#3e2e00" }
desc = { fg = "#eae1d4" }
separator = " ▶ "
separator_style = { fg = "#eae1d4" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#aecfac" }
title_warn  = { fg = "#e5c36c" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#e5c36c" }
active = { fg = "#aecfac", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#e5c36c" }
value  = { fg = "#eae1d4" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#e5c36c", bg = "#3e2e00" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#e5c36c" }
title   = {}
hovered = { fg = "#caebc7", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#eae1d4" }
run    = { fg = "#eae1d4" }
footer = { fg = "#392f15", bg = "#d6c5a0" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#eae1d4" },
    { url = "*/", fg = "#e5c36c" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#e5c36c" },
	{ if = "link", text = "", fg = "#e5c36c" },
	{ if = "block", text = "", fg = "#e5c36c" },
	{ if = "char", text = "", fg = "#e5c36c" },
	{ if = "fifo", text = "", fg = "#e5c36c" },
	{ if = "sock", text = "", fg = "#e5c36c" },
	{ if = "sticky", text = "", fg = "#e5c36c" },
	{ if = "dummy", text = "", fg = "#e5c36c" },

	# Fallback
	{ if = "dir", text = "", fg = "#e5c36c" },
	{ if = "exec", text = "", fg = "#e5c36c" },
	{ if = "!dir", text = "", fg = "#e5c36c" },
]
# : }}}
