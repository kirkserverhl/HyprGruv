# : Manager [[[

[mgr]
cwd = { fg = "#ecdfe5" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ff8f69", bg = "#ff8f69" }
marker_cut      = { fg = "#ffdbcf", bg = "#ffdbcf" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#f5b9a3", bg = "#f5b9a3" }

# Count
count_copied   = { fg = "#321206", bg = "#ffdbcf" }
count_cut      = { fg = "#321206", bg = "#ffdbcf" }
count_selected = { fg = "#4e1e45", bg = "#f5b9a3" }

# Border
border_symbol = "│"
border_style  = { fg = "#f5b2e2" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#f5b2e2", bold = true, bg = "#181216" }
inactive  = { fg = "#dcbed1", bg = "#181216" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#f5b2e2", fg = "#4e1e45", bold = true }
normal_alt  = { bg = "#4f444a", fg = "#d2c2ca" }

# Select mode
select_main = { bg = "#dcbed1", fg = "#3e2a38", bold = true }
select_alt  = { bg = "#4f444a", fg = "#d2c2ca" }

# Unset mode
unset_main = { bg = "#f5b9a3", fg = "#4c2618", bold = true }
unset_alt  = { bg = "#4f444a", fg = "#d2c2ca" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#a65b8b" }
perm_write = { fg = "#e65019" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#ff6836" }
perm_sep   = { fg = "#ff3ebb" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#f5b2e2", bg = "#3f373c" }
progress_error  = { fg = "#ffb4ab", bg = "#3f373c" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3f373c" }
cand = { fg = "#f5b2e2" }
rest = { fg = "#4e1e45" }
desc = { fg = "#ecdfe5" }
separator = " ▶ "
separator_style = { fg = "#ecdfe5" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#f5b9a3" }
title_warn  = { fg = "#f5b2e2" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#f5b2e2" }
active = { fg = "#f5b9a3", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#f5b2e2" }
value  = { fg = "#ecdfe5" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#f5b2e2", bg = "#4e1e45" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#f5b2e2" }
title   = {}
hovered = { fg = "#ffdbcf", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#ecdfe5" }
run    = { fg = "#ecdfe5" }
footer = { fg = "#3e2a38", bg = "#dcbed1" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#ecdfe5" },
    { url = "*/", fg = "#f5b2e2" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#f5b2e2" },
	{ if = "link", text = "", fg = "#f5b2e2" },
	{ if = "block", text = "", fg = "#f5b2e2" },
	{ if = "char", text = "", fg = "#f5b2e2" },
	{ if = "fifo", text = "", fg = "#f5b2e2" },
	{ if = "sock", text = "", fg = "#f5b2e2" },
	{ if = "sticky", text = "", fg = "#f5b2e2" },
	{ if = "dummy", text = "", fg = "#f5b2e2" },

	# Fallback
	{ if = "dir", text = "", fg = "#f5b2e2" },
	{ if = "exec", text = "", fg = "#f5b2e2" },
	{ if = "!dir", text = "", fg = "#f5b2e2" },
]
# : }}}
