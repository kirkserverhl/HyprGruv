# : Manager [[[

[mgr]
cwd = { fg = "#dee3e4" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#7394ff", bg = "#7394ff" }
marker_cut      = { fg = "#d9e2ff", bg = "#d9e2ff" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#bac6ea", bg = "#bac6ea" }

# Count
count_copied   = { fg = "#0e1b37", bg = "#d9e2ff" }
count_cut      = { fg = "#0e1b37", bg = "#d9e2ff" }
count_selected = { fg = "#00363c", bg = "#bac6ea" }

# Border
border_symbol = "│"
border_style  = { fg = "#81d3e0" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#81d3e0", bold = true, bg = "#0e1415" }
inactive  = { fg = "#b1cbd0", bg = "#0e1415" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#81d3e0", fg = "#00363c", bold = true }
normal_alt  = { bg = "#3f484a", fg = "#bfc8ca" }

# Select mode
select_main = { bg = "#b1cbd0", fg = "#1c3438", bold = true }
select_alt  = { bg = "#3f484a", fg = "#bfc8ca" }

# Unset mode
unset_main = { bg = "#bac6ea", fg = "#24304d", bold = true }
unset_alt  = { bg = "#3f484a", fg = "#bfc8ca" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#578791" }
perm_write = { fg = "#4565c6" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#406dff" }
perm_sep   = { fg = "#0ad7f7" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#81d3e0", bg = "#343a3b" }
progress_error  = { fg = "#ffb4ab", bg = "#343a3b" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#343a3b" }
cand = { fg = "#81d3e0" }
rest = { fg = "#00363c" }
desc = { fg = "#dee3e4" }
separator = " ▶ "
separator_style = { fg = "#dee3e4" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#bac6ea" }
title_warn  = { fg = "#81d3e0" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#81d3e0" }
active = { fg = "#bac6ea", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#81d3e0" }
value  = { fg = "#dee3e4" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#81d3e0", bg = "#00363c" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#81d3e0" }
title   = {}
hovered = { fg = "#d9e2ff", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#dee3e4" }
run    = { fg = "#dee3e4" }
footer = { fg = "#1c3438", bg = "#b1cbd0" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#dee3e4" },
    { url = "*/", fg = "#81d3e0" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#81d3e0" },
	{ if = "link", text = "", fg = "#81d3e0" },
	{ if = "block", text = "", fg = "#81d3e0" },
	{ if = "char", text = "", fg = "#81d3e0" },
	{ if = "fifo", text = "", fg = "#81d3e0" },
	{ if = "sock", text = "", fg = "#81d3e0" },
	{ if = "sticky", text = "", fg = "#81d3e0" },
	{ if = "dummy", text = "", fg = "#81d3e0" },

	# Fallback
	{ if = "dir", text = "", fg = "#81d3e0" },
	{ if = "exec", text = "", fg = "#81d3e0" },
	{ if = "!dir", text = "", fg = "#81d3e0" },
]
# : }}}
