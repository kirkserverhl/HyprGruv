# : Manager [[[

[mgr]
cwd = { fg = "#f1dfda" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#e9c44c", bg = "#e9c44c" }
marker_cut      = { fg = "#f4e2a7", bg = "#f4e2a7" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#d7c68d", bg = "#d7c68d" }

# Count
count_copied   = { fg = "#221b00", bg = "#f4e2a7" }
count_cut      = { fg = "#221b00", bg = "#f4e2a7" }
count_selected = { fg = "#561f0d", bg = "#d7c68d" }

# Border
border_symbol = "│"
border_style  = { fg = "#ffb59e" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#ffb59e", bold = true, bg = "#1a110f" }
inactive  = { fg = "#e7bdb1", bg = "#1a110f" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#ffb59e", fg = "#561f0d", bold = true }
normal_alt  = { bg = "#53433f", fg = "#d8c2bc" }

# Select mode
select_main = { bg = "#e7bdb1", fg = "#442a22", bold = true }
select_alt  = { bg = "#53433f", fg = "#d8c2bc" }

# Unset mode
unset_main = { bg = "#d7c68d", fg = "#3a3005", bold = true }
unset_alt  = { bg = "#53433f", fg = "#d8c2bc" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#c35a3c" }
perm_write = { fg = "#968035" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#e3b51f" }
perm_sep   = { fg = "#ff6637" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#ffb59e", bg = "#423734" }
progress_error  = { fg = "#ffb4ab", bg = "#423734" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#423734" }
cand = { fg = "#ffb59e" }
rest = { fg = "#561f0d" }
desc = { fg = "#f1dfda" }
separator = " ▶ "
separator_style = { fg = "#f1dfda" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#d7c68d" }
title_warn  = { fg = "#ffb59e" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#ffb59e" }
active = { fg = "#d7c68d", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#ffb59e" }
value  = { fg = "#f1dfda" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#ffb59e", bg = "#561f0d" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#ffb59e" }
title   = {}
hovered = { fg = "#f4e2a7", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#f1dfda" }
run    = { fg = "#f1dfda" }
footer = { fg = "#442a22", bg = "#e7bdb1" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { url = "*", is = "orphan", bg = "#93000a" },
    { url = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#f1dfda" },
    { url = "*/", fg = "#ffb59e" },
]

# : ]]]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#ffb59e" },
	{ if = "link", text = "", fg = "#ffb59e" },
	{ if = "block", text = "", fg = "#ffb59e" },
	{ if = "char", text = "", fg = "#ffb59e" },
	{ if = "fifo", text = "", fg = "#ffb59e" },
	{ if = "sock", text = "", fg = "#ffb59e" },
	{ if = "sticky", text = "", fg = "#ffb59e" },
	{ if = "dummy", text = "", fg = "#ffb59e" },

	# Fallback
	{ if = "dir", text = "", fg = "#ffb59e" },
	{ if = "exec", text = "", fg = "#ffb59e" },
	{ if = "!dir", text = "", fg = "#ffb59e" },
]
# : }}}
