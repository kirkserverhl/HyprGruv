[Settings]
language = en
folder = ~/Pictures
monitors = All
wallpaper = ~/Pictures/Wallpapers/cat-diner-lonely-road.jpg
show_path_in_tooltip = True
backend = awww
fill = fill
sort = name
color = #ffffff
subfolders = True
all_subfolders = False
show_hidden = False
show_gifs_only = False
post_command = ~/.config/hypr/scripts/set_wallpaper.sh $wallpaper
number_of_columns = 3
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
zen_mode = False
stylesheet = ~/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini
waypaperd_cycle_length = 1800
slideshow_interval = 60
slideshow_enabled = False
show_slideshow_panel = False