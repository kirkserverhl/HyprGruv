# HyprGruv blur settings — tuned via blur-tuner / hyprgruv-settings → Blur
# Applied at runtime by ~/.config/hyprgruv/scripts/apply-hypr-blur.sh (hyprctl eval)

# Global window decoration blur (hl.config decoration.blur)
decoration_enabled=1
decoration_size=10
decoration_passes=3
decoration_noise=0.01
decoration_contrast=0.8
decoration_vibrancy=0.2

# Per-layer rules (hl.layer_rule) — blur strength follows global decoration blur.
# ignore_alpha: lower = more blur visible through transparency
layer_rofi_blur=1
layer_rofi_ignore_alpha=0.2

layer_waypaper_blur=1
layer_waypaper_ignore_alpha=0.10

layer_wlogout_blur=1
layer_wlogout_ignore_alpha=0.0001

layer_hyprlock_blur=1
layer_hyprlock_ignore_alpha=0.05

# hyprlock background { } internal blur (hyprlock.conf; takes effect on next lock)
hyprlock_bg_blur_passes=3
hyprlock_bg_blur_size=2