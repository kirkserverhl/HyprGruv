include=~/.config/fuzzel/colors.ini

[main]
font=Agave Nerd Font Propo:size=16
terminal=kitty
icon-theme=Papirus
width=36
horizontal-pad=18
vertical-pad=10
inner-pad=6
line-height=20
anchor=center
prompt="› "

[border]
width=0
radius=14
selection-radius=6

# Colors are provided by the included matugen-generated colors.ini
# We keep the background very transparent so Hyprland's live blur (layerrule) can show through.
